# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; use os.path.sep if you want migrations in subdirectories
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
# defaults to the current working directory.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# leave blank for localtime
# timezone =

# max length of characters to use in "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc files to be created
# sourceless = false

# version location specification; this defaults
# to migrations/versions.  When using multiple version
# directories, initial rev cannot be opaque, but must be a
# fixed revision, and subsequent revisions must be child
# of it.
# version_locations = %(here)s/bar/versions %(here)s/bat/versions

# version_path_separator = :

# set to 'true' to enable searching for versions recursively
# recursive_version_locations = false

# the output encoding used when writing new migration files
# output_encoding = utf-8

sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/agentick_be


[post_write_hooks]
# post_write_hooks allows database migration scripts to be run through
# post-processing tools after generating them.

# [black]
# type = console_scripts
# entrypoint = black
# options = -l 79 REVISION_SCRIPT_FILE

# [ruff]
# type = console_scripts
# entrypoint = ruff
# options = check --fix REVISION_SCRIPT_FILE

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
